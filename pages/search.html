<!DOCTYPE html>
<html lang="ar">

    <title>Document</title>



<style>

        
       
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
    
        
   
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

    
        .search-container {

            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
     
            border: 1px solid rgba(255, 204, 0, 0.3); 
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .search-container h1 {
            color: #ffcc00; 
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .search-wrapper {
            display: flex;
            gap: 0; 
            background: white;
            padding: 5px;
            border-radius: 50px; 
            overflow: hidden;
             box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); 
        }

        #search {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            outline: none;
            background: transparent;
            text-align: right;
        }

        .search-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 0 30px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 50px;
        }

        .search-btn:hover {
            background: #e6b800;
            transform: scale(1.02);
        }

        footer {
            background-color: rgba(30, 30, 47, 0.95);
            color: white;
            text-align: center;
            padding: 20px 0;
            width: 100%;
            margin-top: auto; 
        }
        
        .footer-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding-bottom: 15px;
        }
        
        .footer-box h3 { color: #ffcc00; margin-bottom: 10px; }
        .footer-box ul { list-style: none; padding: 0; }
        .footer-box ul li a { color: white; text-decoration: none; font-size: 14px; }
        .footer-box ul li a:hover { color: #ffcc00; }
        .social-link { color: white; text-decoration: none; font-size: 14px; margin: 0 5px; }
        .social-link:hover { color: #ffcc00; }
</style>


</head>
<body>


<header>
    <nav class="navbar">

           
        <h1 style="  color: #ffcc00;">Cooking Website</h1>
         <button id="theme-toggle"> تبديل الوضع </button>
        <ul >
            <li><a href="index.html">Home</a></li>
            <li><a href="recipes.html">Recipes</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="compare.html">Compare</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="details.html">details</a></li>
            <li><a href="profile.html">profile</a></li>
        </ul>
    
    </nav>
    </header>



    <div class="main-content">
        <div class="search-container">
            <h1>أهلاً بك في مطبخك.. ابحث عن وصفة</h1>
            <div class="search-wrapper">
                <input type="search" name="search" id="search" placeholder="ابحث عن وصفتك هنا">
                <button type="submit" class="search-btn">بحث</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-box">
                <h3>روابط سريعة</h3>
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="recipes.html">الوصفات</a></li>
                    <li><a href="contact.html">تواصل معنا</a></li>
                </ul>
            </div>
            <div class="footer-box">
                <h3>تابعنا</h3>
            <p><a class="social-link" href="https://www.facebook.com/" target="_blank">فيسبوك</a>|<a class="social-link" href="https://www.instagram.com/?hl=en" target="_blank">انستجرام</a>|<a class="social-link" href="https://www.youtube.com/" target="_blank">يوتيوب</a></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; جميع الحقوق محفوظة 2026</p>
        </div>
    </footer>
    

         <script src="script.js"></script>
    <script>
       
    const searchInput = document.getElementById('search');
    const searchBtn = document.querySelector('.search-btn');

     
    function performSearch() {
      
        const query = searchInput.value.toLowerCase().trim();

        if (query === "") {
            alert("من فضلك اكتب اسم الوصفة أولاً!");
            return;
        }
        

        const recipes = [
            "pizza", "crep", "steak", 
            "burger", "kapap", "salad", 
            "chicken", "spaghetti", "fish"
        ];

        
        const match = recipes.find(recipe => query.includes(recipe));

        if (match) {
            
            window.location.href = `details.html?recipe=${match}`;
        } else {
            alert("عذراً، هذه الوصفة غير موجودة حالياً. جرب البحث عن (Pizza, Burger, or Chicken)");
        }
    }

    
    searchBtn.addEventListener('click', performSearch);

    searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
</script>
</body>

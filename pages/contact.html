    </nav>
<section class="contact-section">
    <div class="contact-container">
        <h2>تواصل معنا / تقديم شكوى</h2>
        <p>لديك استفسار عن وصفة أو مشكلة في الموقع؟ نحن هنا للمساعدة!</p>

        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">الاسم بالكامل</label>
                <input type="text" id="name" name="user_name" placeholder="ادخل اسمك هنا" required>
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="user_email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label for="subject">نوع الموضوع</label>
                <select id="subject" name="subject">
                    <option value="complaint">تقديم شكوى</option>
                    <option value="suggestion">اقتراح وصفة جديدة</option>
                    <option value="technical">مشكلة تقنية في الموقع</option>
                    <option value="other">أخرى</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">تفاصيل الرسالة</label>
                <textarea id="message" name="message" rows="5" placeholder="اكتب كل اللي محتاجه هنا..." required></textarea>
            </div>
            <div class="form-group">
            <label for="rating">ما هو تقييمك للموقع؟</label>
            <input type="range" id="rating" name="rating" min="1" max="10">
            </div>

            <button type="submit" class="submit-btn">إرسال الرسالة</button>
        </form>
    </div>
</section>

       <script src="script.js"></script>
    </body>

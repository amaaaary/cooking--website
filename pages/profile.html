<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>معرض السيارات - (اكتب اسم الصفحة هنا)</title>
    <link id="theme-link" rel="stylesheet" href="light-theme.css">
    <style>
        .profile-box {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            color: #333;
        }
        .user-avatar {
            width: 100px;
            height: 100px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 15px;
        }
        .info-group { margin: 15px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .info-group label { font-weight: bold; color: #777; display: block; }
        .info-group span { font-size: 18px; color: #222; }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
    <nav>
        <h1>Cooking Website</h1>
         <button id="theme-toggle"> تبديل الوضع </button>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="recipes.html">Recipes</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="compare.html">Compare</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="details.html">details</a></li>
            <li><a href="profile.html">profile</a></li>
        </ul>
    </nav>
</header>
    <h1>محتوى صفحة (اسم الصفحة)</h1>
    <div class="profile-box">
        <h1>مرحباً بك</h1>
        <div class="user-info">
            <p>الاسم: <span id="p-name"></span></p>
            <p>الإيميل: <span id="p-email"></span></p>
        </div>
        <button class="logout-btn" onclick="logout()">خروج</button>
    </div>

    <script>
        window.onload = function() {
            const name = localStorage.getItem('userName');
            const email = localStorage.getItem('userEmail');

            if (name && email) {
                document.getElementById('p-name').innerText = name;
                document.getElementById('p-email').innerText = email;
            } else {
                window.location.href = "login.html";
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>

       <script src="script.js"></script>
    </body>
</html>
